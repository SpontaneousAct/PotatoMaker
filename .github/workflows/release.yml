name: Release PotatoMaker

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match Directory.Build.props)"
        required: true
        type: string
      prerelease:
        description: "Mark the draft as a prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: potatomaker-release
  cancel-in-progress: false

jobs:
  release:
    name: Build and create draft release
    runs-on: windows-latest
    timeout-minutes: 120
    env:
      SOURCE_REF: ${{ github.ref }}
      SOURCE_SHA: ${{ github.sha }}
      REQUESTED_VERSION: ${{ inputs.version }}
      REQUESTED_PRERELEASE: ${{ inputs.prerelease }}

    steps:
      - name: Require master
        shell: pwsh
        run: |
          if ($env:SOURCE_REF -ne "refs/heads/master") {
              throw "Releases must be run from master. Selected ref: $env:SOURCE_REF"
          }

      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Validate version and release target
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          [xml]$props = Get-Content .\Directory.Build.props
          $versionNode = @($props.Project.PropertyGroup) |
              Where-Object { $_.PSObject.Properties.Name -contains "VersionPrefix" } |
              Select-Object -First 1
          $versionPrefix = $versionNode.VersionPrefix.InnerText.Trim()
          $suffixNode = @($props.Project.PropertyGroup) |
              Where-Object { $_.PSObject.Properties.Name -contains "VersionSuffix" } |
              Select-Object -First 1
          $versionSuffix = if ($null -ne $suffixNode) { $suffixNode.VersionSuffix.InnerText.Trim() } else { "" }
          $version = if ([string]::IsNullOrWhiteSpace($versionSuffix)) {
              $versionPrefix
          }
          else {
              "$versionPrefix-$versionSuffix"
          }

          if ([string]::IsNullOrWhiteSpace($versionPrefix)) {
              throw "VersionPrefix was not found in Directory.Build.props."
          }

          if ($version -notmatch '^\d+\.\d+\.\d+(?:-[0-9A-Za-z.-]+)?$') {
              throw "Version '$version' is not a supported semantic version."
          }

          $requestedVersion = $env:REQUESTED_VERSION.Trim()
          if ($requestedVersion.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
              $requestedVersion = $requestedVersion.Substring(1)
          }
          if ($requestedVersion -ne $version) {
              throw "Requested version '$env:REQUESTED_VERSION' does not match repository version '$version'."
          }

          $tag = "v$version"
          $encodedTag = [System.Uri]::EscapeDataString($tag)
          $headers = @{
              Accept = "application/vnd.github+json"
              Authorization = "Bearer $env:GH_TOKEN"
              "X-GitHub-Api-Version" = "2022-11-28"
              "User-Agent" = "PotatoMaker-release-workflow"
          }

          Write-Host "Validated requested version '$requestedVersion' against repository version '$version'."
          Write-Host "Checking whether tag or release '$tag' already exists..."

          $tagLookup = Invoke-WebRequest `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/git/ref/tags/$encodedTag" `
              -Headers $headers `
              -SkipHttpErrorCheck
          if ($tagLookup.StatusCode -eq 200) {
              throw "Tag '$tag' already exists. Bump VersionPrefix before releasing."
          }
          if ($tagLookup.StatusCode -ne 404) {
              throw "Could not check whether tag '$tag' exists. GitHub returned HTTP $($tagLookup.StatusCode)."
          }

          $releaseLookup = Invoke-WebRequest `
              -Uri "https://api.github.com/repos/$env:GITHUB_REPOSITORY/releases/tags/$encodedTag" `
              -Headers $headers `
              -SkipHttpErrorCheck
          if ($releaseLookup.StatusCode -eq 200) {
              throw "A GitHub release for '$tag' already exists. Delete an abandoned draft or bump the version."
          }
          if ($releaseLookup.StatusCode -ne 404) {
              throw "Could not check whether a GitHub release for '$tag' exists. GitHub returned HTTP $($releaseLookup.StatusCode)."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          Write-Host "Preparing $tag from $env:SOURCE_SHA"

      - name: Restore
        run: dotnet restore .\PotatoMaker.slnx

      - name: Test
        run: dotnet test .\PotatoMaker.Tests -c Release --no-restore

      - name: Package and upload draft release
        shell: pwsh
        env:
          POTATOMAKER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          $prerelease = [bool]::Parse($env:REQUESTED_PRERELEASE)
          .\scripts\publish-velopack.ps1 `
              -Version $env:RELEASE_VERSION `
              -Configuration Release `
              -Runtime win-x64 `
              -Framework net10.0 `
              -PackTitle PotatoMaker `
              -Authors PotatoMaker `
              -Channel win-x64 `
              -GitHubRepoUrl "https://github.com/$env:GITHUB_REPOSITORY" `
              -SingleFile:$false `
              -ReadyToRun:$false `
              -DownloadPreviousReleases:$true `
              -UploadToGitHub:$true `
              -PublishRelease:$false `
              -Prerelease:$prerelease `
              -MergeAssets:$false `
              -ReleaseName "PotatoMaker $env:RELEASE_VERSION" `
              -ReleaseTag $env:RELEASE_TAG `
              -TargetCommitish $env:SOURCE_SHA

      - name: Add checksums and generated release notes
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ steps.release.outputs.version }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          $releaseDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\velopack\win-x64"
          $assetNames = @(
              "PotatoMaker-$env:RELEASE_VERSION-win-x64-full.nupkg",
              "PotatoMaker-win-x64-Portable.zip",
              "PotatoMaker-win-x64-Setup.exe"
          )

          $checksumLines = foreach ($assetName in $assetNames) {
              $assetPath = Join-Path $releaseDir $assetName
              if (-not (Test-Path $assetPath)) {
                  throw "Expected release asset was not created: $assetName"
              }
              $hash = (Get-FileHash $assetPath -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $assetName"
          }

          $checksumPath = Join-Path $releaseDir "SHA256SUMS.txt"
          $checksumLines | Set-Content $checksumPath
          gh release upload `
              $env:RELEASE_TAG `
              $checksumPath `
              --clobber
          if ($LASTEXITCODE -ne 0) {
              throw "Failed to upload SHA256SUMS.txt."
          }

          $generated = gh api `
              --method POST `
              "repos/$env:GITHUB_REPOSITORY/releases/generate-notes" `
              -f tag_name=$env:RELEASE_TAG `
              -f target_commitish=$env:SOURCE_SHA | ConvertFrom-Json
          if ($LASTEXITCODE -ne 0) {
              throw "Failed to generate release notes."
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          $generated.body | Set-Content $notesPath
          gh release edit $env:RELEASE_TAG --notes-file $notesPath
          if ($LASTEXITCODE -ne 0) {
              throw "Failed to update the draft release notes."
          }

          $release = gh release view $env:RELEASE_TAG --json isDraft,isPrerelease,targetCommitish,url | ConvertFrom-Json
          if (-not $release.isDraft) {
              throw "The release was unexpectedly published instead of remaining a draft."
          }
          if ($release.targetCommitish -ne $env:SOURCE_SHA) {
              throw "Release target '$($release.targetCommitish)' does not match build commit '$env:SOURCE_SHA'."
          }

          @(
              "## Draft release created",
              "",
              "- Release: [$env:RELEASE_TAG]($($release.url))",
              "- Commit: ``$env:SOURCE_SHA``",
              "- Status: draft; review and publish it from GitHub Releases"
          ) | Add-Content $env:GITHUB_STEP_SUMMARY
